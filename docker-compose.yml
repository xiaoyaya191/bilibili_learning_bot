version: "3.9"

services:
  bilibili-bot:
    build: .
    container_name: bilibili_learning_bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./Data:/app/Data
      - ./KnowledgeBase:/app/KnowledgeBase
      - ./highlights:/app/highlights
    environment:
      - WEB_PORT=8080
      - WEB_HOST=0.0.0.0
      # AI API 配置（推荐用环境变量，更安全）
      # - BILI_AI_API_KEY=sk-你的APIKey
      # - BILI_AI_BASE_URL=https://api.openai.com/v1
      # - BILI_BOT_NAME=你的机器人名字
